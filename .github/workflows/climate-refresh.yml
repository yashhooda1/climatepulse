name: ClimatePulse — daily data refresh

on:
  schedule:
    - cron: '0 4 * * *'  # Every day 04:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout climatepulse repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas scikit-learn numpy requests

      - name: Run pipeline
        env:
          NOAA_TOKEN: ${{ secrets.NOAA_TOKEN }}
        run: python scripts/climate_pipeline.py

      - name: Build hurricane analytics
        continue-on-error: true
        run: python scripts/hurricane_pipeline.py

      - name: Build sea level analytics
        continue-on-error: true
        run: python scripts/sealevel_pipeline.py

      - name: Build U.S. grid feed (EIA)
        continue-on-error: true
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python scripts/eia_grid_pipeline.py

      - name: Validate output exists and is valid JSON
        run: |
          python3 -c "
          import json, sys
          try:
              data = json.load(open('public_data_climate_gold.json'))
              assert 'IAH' in data and 'EWR' in data
              assert len(data['IAH']['yearly']) > 50
              assert len(data['EWR']['yearly']) > 50
              print('✅ Validation passed')
          except Exception as e:
              print(f'❌ Validation failed: {e}')
              sys.exit(1)
          "

      - name: Push updated gold data to yashhooda repo
        env:
          PAT: ${{ secrets.YASHHOODA_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/yashhooda1/yashhooda.git site-repo
          cp public_data_climate_gold.json     site-repo/public_data_climate_gold.json
          cp public_data_hurricanes_gold.json  site-repo/public_data_hurricanes_gold.json
          cp public_data_sealevel_gold.json  site-repo/public_data_sealevel_gold.json
          cp public_data_us_grid_gold.json   site-repo/public_data_us_grid_gold.json
          cd site-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public_data_climate_gold.json public_data_hurricanes_gold.json \
                  public_data_sealevel_gold.json public_data_us_grid_gold.json
          git diff --staged --quiet \
            || git commit -m "chore: refresh ClimatePulse gold data (climate, hurricanes, sea level, US grid) [skip ci]"
          git push
